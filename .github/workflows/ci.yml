name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - run: npm ci

      - name: Run tests
        id: tests
        env:
          NO_COLOR: "1"
          FORCE_COLOR: "0"
          TERM: dumb
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.txt

      - name: Publish test summary
        if: always()
        run: |
          perl -pe 's/\e\[[0-9;]*[[:alpha:]]//g' test-output.txt > test-output-clean.txt

          {
            echo "## Test Results"
            echo ""
            if [ "${{ steps.tests.outcome }}" = "success" ]; then
              echo "PASS: npm test"
            else
              echo "FAIL: npm test"
            fi
            echo ""
            echo "<details><summary>Test output (last 200 lines)</summary>"
            echo ""
            echo '```text'
            tail -n 200 test-output-clean.txt
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
