# Vercel Deployment Check
# This workflow will run tests before allowing deployment via Vercel.

name: Vercel Deployment Check

on:
  deployment:
    types: [created]

jobs:
  test-before-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test
