# Vercel Deployment Check
# Runs tests and reports status back to Vercel via repository_dispatch.

name: Vercel Deployment Check

on:
  repository_dispatch:
    types: [vercel-deployment]

jobs:
  test-before-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test
      - name: Report success to Vercel
        if: success()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          status: completed
          conclusion: success
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Report failure to Vercel
        if: failure()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          status: completed
          conclusion: failure
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
